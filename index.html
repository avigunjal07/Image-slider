<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image slider</title>

    <style>
        .slider-container{
            margin: 50px auto;
            width: fit-content;
            position: relative;
        }

        .slide{
            object-fit: cover;
            width: 600px;
            height: 400px;
            border-radius: 15px;
        }

        #main-heading{
            text-align: center;
            font-size: 40px;
        }

        #main-heading-hr{
            height: 1px;
            width: 75%;
        }

        .season-name{
            text-align: center;
            margin-top: -35px;
        }

        .nav{
            position: absolute;
            top: 40%;
            width: 40px;
            cursor: pointer;
        }

        #back{
            left: 5px;
        }
        #back{
            transform: (0.8) translateX(-10px);
        }

        #next{
            right: 5px;
        }
        #next:hover{
            transform: (0.8) translateX(-10px);
        }

    </style>
</head>
<body>
    <h1 id="main-heading">Image Slider</h1>
    <hr id="main-heading-hr">
    <div class="slider-container">
    <img src="./images/autumn.jpg" class="slide" id="slide">

    <img src="./images/back.png" class="nav" id="back">

    <img src="./images/next.png" class="nav" id="next">
</div>

    <div class="season-name"><h1>*** Autumn ***</h1></div>
</body>
</html>
