<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image slider</title>

    <style>
        .slider-container{
            margin: 50px auto;
            width: fit-content;
            position: relative;
        }

        .slide{
            object-fit: cover;
            width: 600px;
            height: 400px;
            border-radius: 15px;
        }

        #main-heading{
            text-align: center;
            font-size: 40px;
        }

        #main-heading-hr{
            height: 1px;
            width: 75%;
        }

        .season-name{
            text-align: center;
            margin-top: -35px;
        }

        .nav{
            position: absolute;
            top: 40%;
            width: 40px;
            cursor: pointer;
        }

        #back{
            left: 5px;
        }

        #next{
            right: 5px;
        }

    </style>
</head>
<body>
    <h1 id="main-heading">Image Slider</h1>
    <hr id="main-heading-hr">
    <div class="slider-container">
    <img src="./images/autumn.jpg" class="slide" id="slide">

    <img src="./images/back.png" class="nav" id="back" onclick="backSlide()" ondblclick="backSlide()">

    <img src="./images/next.png" class="nav" id="next" onclick="nextSlide()" ondblclick="nextSlide()">
</div>

    <div class="season-name" id="season-name"><h1>*** Autumn ***</h1></div>

<script>
    let slide=document.getElementById("slide");

    let imgArray=["./images/autumn.jpg","./images/summer.jpg","./images/spring.jpg","./images/monsoon.jpg","./images/prewinter.jpg","./images/winter.jpg"];

    let seasonArray=["Autumn","Summer","Spring","Monsoon","Pre-Winter","Winter"];

    let seasonName=document.getElementById("season-name");

    let index=0;

    function nextSlide(){
        if(index>=imgArray.length-1){
            index=0;
        }
        else{
            index++;
        }
        slide.src=imgArray[index];
        seasonName.innerHTML=`<h1>*** ${seasonArray[index]} ***</h1>`;
    };

    function backSlide(){
        if(index<=0){
            index=imgArray.length-1;
        }
        else{
            index--;
        }
        slide.src=imgArray[index];
    }
</script>

</body>
</html>
